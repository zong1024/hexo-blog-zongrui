name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute site URL
        shell: bash
        run: |
          OWNER='${{ github.repository_owner }}'
          REPO='${{ github.event.repository.name }}'
          OWNER_LOWER="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"

          if [ "$REPO" = "$OWNER_LOWER.github.io" ] || [ "$REPO" = "$OWNER.github.io" ]; then
            echo "SITE_URL=https://$OWNER_LOWER.github.io" >> "$GITHUB_ENV"
            echo "SITE_ROOT=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://$OWNER_LOWER.github.io/$REPO" >> "$GITHUB_ENV"
            echo "SITE_ROOT=/$REPO/" >> "$GITHUB_ENV"
          fi

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
